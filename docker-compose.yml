version: "3.8"

services:
  # ----------------------------
  # PostgreSQL Database
  # ----------------------------
  postgres:
    image: postgres:15-alpine
    container_name: youtube_summarizer_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: youtube_summarizer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d youtube_summarizer"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  # ----------------------------
  # Backend Service (FastAPI)
  # ----------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: youtube_summarizer_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_cache:/root/.cache
    networks:
      - app-network

volumes:
  postgres_data:
  backend_cache:

networks:
  app-network:
    driver: bridge